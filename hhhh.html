<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Heart Animation</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <canvas id="mainCanvas"></canvas>

    <script>
        class HeartAnimation {
            constructor() {
                this.canvas = document.getElementById('mainCanvas');
                this.ctx = this.canvas.getContext('2d', { alpha: false });
                this.text = "I LOVE YOU ";
                this.layers = [];
                this.time = 0;
                this.init();
            }

            init() {
                window.addEventListener('resize', () => this.resize());
                this.resize();
                this.loop();
            }

            resize() {
                this.width = this.canvas.width = window.innerWidth;
                this.height = this.canvas.height = window.innerHeight;
                this.cx = this.width / 2;
                this.cy = this.height / 2;
                this.sc = Math.min(this.width, this.height) / 40;
                this.buildLayers();
            }

            // Math Heart Formula
            getPos(t, sf) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                return { x: x * sf * this.sc + this.cx, y: y * sf * this.sc + this.cy };
            }

            buildLayers() {
                this.layers = [];
                for (let li = 0; li < 12; li++) {
                    const sf = 1.2 - (li * 0.08);
                    const np = 120 - (li * 4);
                    this.layers.push({
                        spd: (0.005 + li * 0.001) * (li % 2 ? 1 : -1),
                        fs: 24 - li,
                        alpha: 1 - (li / 15),
                        points: Array.from({ length: np }, (_, i) => {
                            const t = (i / np) * Math.PI * 2;
                            return this.getPos(t, sf);
                        })
                    });
                }
            }

            draw() {
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                this.ctx.fillRect(0, 0, this.width, this.height);
                this.time += 0.02;

                this.layers.forEach((layer, li) => {
                    this.ctx.font = `bold ${layer.fs}px Arial`;
                    this.ctx.textAlign = 'center';
                    
                    // Neon Effect
                    this.ctx.shadowBlur = 10;
                    this.ctx.shadowColor = `hsla(${300 + li * 10}, 100%, 60%, 1)`;
                    this.ctx.fillStyle = `hsla(${300 + li * 10}, 100%, 70%, ${layer.alpha})`;

                    layer.points.forEach((p, i) => {
                        const charIdx = Math.floor((i + this.time * 20) % this.text.length);
                        this.ctx.fillText(this.text[charIdx], p.x, p.y);
                    });
                });
            }

            loop() {
                this.draw();
                requestAnimationFrame(() => this.loop());
            }
        }

        new HeartAnimation();
    </script>
</body>
</html>
